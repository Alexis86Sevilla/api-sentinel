<div class="flex items-center gap-2">
  <span class="text-sm text-slate-400">{{ i18n.t('language.select') }}:</span>
  <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
    <button
      (click)="setLanguage('es')"
      [class.bg-cyan-600]="currentLang() === 'es'"
      [class.text-white]="currentLang() === 'es'"
      [class.text-slate-400]="currentLang() !== 'es'"
      class="cursor-pointer px-3 py-1 rounded-md text-sm font-medium transition-all">
      {{ i18n.t('language.es') }}
    </button>
    <button
      (click)="setLanguage('en')"
      [class.bg-cyan-600]="currentLang() === 'en'"
      [class.text-white]="currentLang() === 'en'"
      [class.text-slate-400]="currentLang() !== 'en'"
      class="cursor-pointer px-3 py-1 rounded-md text-sm font-medium transition-all">
      {{ i18n.t('language.en') }}
    </button>
  </div>
</div>
