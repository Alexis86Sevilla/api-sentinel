<div class="h-screen w-screen p-10 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <div class="flex flex-col gap-4 justify-center items-center">
    <div class="flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
    class="lucide lucide-shield w-12 h-12 text-cyan-400">
    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1
    1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19
    5a1 1 0 0 1 1 1z"></path></svg>
    <h1
      class="text-2xl md:text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500
      bg-clip-text text-transparent p-1">
      Analizador de Seguridad Web
    </h1>
    </div>

    <h2 class="text-lg font-medium text-white/80 text-center">Analiza la seguridad
      de cualquier sitio web en segundos</h2>
  </div>

  <div class="max-w-3xl mx-auto bg-slate-800/50 mt-20 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-8 mb-8 shadow-xl">
    <div class="flex">
<input #url type="text" placeholder="https://www.example.com" class="border border-slate-700
rounded-l-lg px-4 py-2 bg-slate-800 text-white flex-1">
    <button (click)="onSearchByUrl(url.value)" class="px-8 py-4 cursor-pointer bg-gradient-to-r from-cyan-500
    to-blue-600 rounded-r-xl font-semibold hover:from-cyan-600 hover:to-blue-700
    disabled:opacity-50 disabled:cursor-not-allowed transition-all flex
    items-center gap-2 shadow-lg hover:shadow-cyan-500/50 text-white">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
    stroke-linejoin="round" class="w-5 h-5">
    <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
    Analizar</button>
    </div>

  </div>
</div>
