<div class="h-screen w-screen p-10 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <div class="flex flex-col gap-4 justify-center items-center">
    <div class="flex items-center gap-2">
      <img src="/icons/shield.svg" alt="Shield Icon" class="w-12 h-12 text-cyan-400">
    <h1
      class="text-2xl md:text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500
      bg-clip-text text-transparent p-1">
      Analizador de Seguridad Web
    </h1>
    </div>

    <h2 class="text-lg font-medium text-white/80 text-center">Analiza la seguridad
      de cualquier sitio web en segundos</h2>
  </div>

  <div class="max-w-3xl mx-auto bg-slate-800/50 mt-12 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-8 mb-8 shadow-xl">
    <div class="flex">
<input #url type="text" placeholder="https://www.example.com" class="border border-slate-700
rounded-l-lg px-4 py-2 bg-slate-800 text-white flex-1">
    <button (click)="onSearchByUrl(url.value)" class="px-8 py-4 cursor-pointer bg-gradient-to-r from-cyan-500
    to-blue-600 rounded-r-xl font-semibold hover:from-cyan-600 hover:to-blue-700
    disabled:opacity-50 disabled:cursor-not-allowed transition-all flex
    items-center gap-2 shadow-lg hover:shadow-cyan-500/50 text-white">
        <img src="icons/search.svg" alt="Search Icon" class="w-5 h-5">
    Analizar</button>
    </div>

  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
    @if (headersReport(); as report) {
      <app-security-card [report]="report" title="Headers de Seguridad"></app-security-card>
    }
    @if (sslReport(); as report) {
      <app-security-card [report]="report" title="SSL/TLS"></app-security-card>
    }
    @if (cookiesReport(); as report) {
      <app-security-card [report]="report" title="Cookies"></app-security-card>
    }
    @if (vulnerabilitiesReport(); as report) {
      <app-security-card [report]="report" title="Vulnerabilidades"></app-security-card>
    }
    @if (serverConfigReport(); as report) {
      <app-security-card [report]="report" title="Configuración del Servidor"></app-security-card>
    }
  </div>
</div>
