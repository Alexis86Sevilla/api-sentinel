<div class="min-h-screen w-full p-6 md:p-10 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <div class="flex flex-col gap-4 justify-center items-center mb-8">
    <div class="flex items-center gap-2">
      <img src="icons/shield.svg" alt="Shield Icon" class="w-12 h-12 text-cyan-400">
      <h1 class="text-2xl md:text-4xl text-center font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent p-1">
        Analizador de Seguridad Web
      </h1>
    </div>
    <h2 class="text-lg font-medium text-white/80 text-center">
      Analiza la seguridad de cualquier sitio web en segundos
    </h2>
  </div>

  <div class="max-w-3xl mx-auto bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-6 md:p-8 mb-8 shadow-xl">
    <div class="flex flex-col gap-2">
      <div class="flex">
        <input #urlInput
               type="text"
               placeholder="https://www.ejemplo.com"
               [class.border-rose-500]="showValidation() && !isValidUrl()"
               [class.border-emerald-500]="showValidation() && isValidUrl()"
               [class.border-slate-700]="!showValidation()"
               class="border rounded-l-lg px-4 py-3 bg-slate-800 text-white flex-1 focus:outline-none focus:border-cyan-500 transition-colors"
               (input)="onInputChange(urlInput.value)"
               (keydown.enter)="onSearchByUrl(urlInput.value)">
        <button (click)="onSearchByUrl(urlInput.value)"
                [disabled]="isLoading() || !isValidUrl()"
                class="px-6 md:px-8 py-3 cursor-pointer bg-gradient-to-r from-cyan-500 to-blue-600 rounded-r-xl font-semibold hover:from-cyan-600 hover:to-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2 shadow-lg hover:shadow-cyan-500/50 text-white">
          <img src="icons/search.svg" alt="Search Icon" class="w-5 h-5">
          <span class="hidden md:inline">Analizar</span>
        </button>
      </div>
      @if (showValidation()) {
        <span class="text-sm" [class.text-rose-400]="!isValidUrl()" [class.text-emerald-400]="isValidUrl()">
          @if (isValidUrl()) {
            ✓ URL válida
          } @else {
            ✗ Introduce una URL válida (ej: https://ejemplo.com)
          }
        </span>
      }
    </div>
  </div>

  @if (isLoading()) {
    <app-loading-spinner></app-loading-spinner>
  }
  @if (allReportsReady()) {
    <app-security-score [score]="overallScore()"></app-security-score>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <app-security-card [report]="headersReport()!" title="Headers de Seguridad" style="--animation-delay: 0ms"></app-security-card>
      <app-security-card [report]="sslReport()!" title="SSL/TLS" style="--animation-delay: 100ms"></app-security-card>
      <app-security-card [report]="cookiesReport()!" title="Cookies" style="--animation-delay: 200ms"></app-security-card>
      <app-security-card [report]="vulnerabilitiesReport()!" title="Vulnerabilidades" style="--animation-delay: 300ms"></app-security-card>
      <app-security-card [report]="serverConfigReport()!" title="Configuración del Servidor" style="--animation-delay: 400ms"></app-security-card>
    </div>
  }
</div>
