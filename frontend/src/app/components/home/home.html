<div class="min-h-[66dvh]  p-6 md:p-10 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <div class="flex justify-end mb-6">
    <app-language-selector></app-language-selector>
  </div>

  <div class="flex flex-col md:flex-row items-center justify-center gap-2 md:gap-3 mb-12">
    <div class="relative">
      <div class="absolute inset-0 bg-white/4 backdrop-blur-md rounded-3xl"></div>
      <div class="relative">
        <img src="logo-no-bg.png" alt="API Sentinel Logo" class="w-24 h-24 md:w-32 md:h-32 object-contain drop-shadow-2xl">
      </div>
    </div>

    <div class="flex flex-col items-center md:items-start gap-2">
      <h1 class="text-3xl md:text-5xl text-center font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent pb-2">
        {{ i18n.t('app.title') }}
      </h1>
      <h2 class="text-lg md:text-xl font-medium text-white/80 text-center md:text-left">
        {{ i18n.t('app.subtitle') }}
      </h2>
    </div>
  </div>

  <div class="max-w-3xl mx-auto bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 p-6 md:p-8 mb-8 shadow-xl">
    <div class="flex flex-col gap-2">
      <div class="flex">
        <input #urlInput
               type="text"
               [placeholder]="i18n.t('search.placeholder')"
               [class.border-rose-500]="showValidation() && !isValidUrl()"
               [class.border-emerald-500]="showValidation() && isValidUrl()"
               [class.border-slate-700]="!showValidation()"
               class="border rounded-l-lg px-4 py-3 bg-slate-800 text-white flex-1 focus:outline-none focus:border-cyan-500 transition-colors"
               (input)="onInputChange(urlInput.value)"
               (keydown.enter)="onSearchByUrl(urlInput.value)">
        <button (click)="onSearchByUrl(urlInput.value)"
                [disabled]="isLoading() || !isValidUrl()"
                class="px-6 md:px-8 py-3 cursor-pointer bg-gradient-to-r from-cyan-500 to-blue-600 rounded-r-xl font-semibold hover:from-cyan-600 hover:to-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center gap-2 text-white">
          <img src="icons/search.svg" alt="Search Icon" class="w-5 h-5">
          <span class="hidden md:inline">{{ i18n.t('search.button') }}</span>
        </button>
      </div>
      @if (showValidation()) {
        <span class="text-sm" [class.text-rose-400]="!isValidUrl()" [class.text-emerald-400]="isValidUrl()">
          @if (isValidUrl()) {
            {{ i18n.t('search.validation.valid') }}
          } @else {
            {{ i18n.t('search.validation.invalid') }}
          }
        </span>
      }
    </div>
  </div>

  @if (isLoading()) {
    <app-loading-spinner></app-loading-spinner>
  }

  @if (allReportsReady()) {
    <app-security-score [score]="overallScore()"></app-security-score>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <app-security-card [report]="headersReport()!" [title]="i18n.t('cards.headers')" style="--animation-delay: 0ms"></app-security-card>
      <app-security-card [report]="sslReport()!" [title]="i18n.t('cards.ssl')" style="--animation-delay: 100ms"></app-security-card>
      <app-security-card [report]="cookiesReport()!" [title]="i18n.t('cards.cookies')" style="--animation-delay: 200ms"></app-security-card>
      <app-security-card [report]="vulnerabilitiesReport()!" [title]="i18n.t('cards.vulnerabilities')" style="--animation-delay: 300ms"></app-security-card>
      <app-security-card [report]="serverConfigReport()!" [title]="i18n.t('cards.serverConfig')" style="--animation-delay: 400ms"></app-security-card>
    </div>
  }
</div>
