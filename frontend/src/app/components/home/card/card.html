<div class="backdrop-blur-sm rounded-2xl border p-6 shadow-xl transition-all duration-300"
     [ngClass]="[theme().border, theme().bg]">
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-2.5">
      <img [src]="'/icons/' + theme().type + '.svg'" alt="status icon" class="w-6 h-6">
      <h3 class="text-lg font-bold text-white leading-none">{{ title() }}</h3>
    </div>
     <span class="text-2xl font-extrabold" [ngClass]="theme().scoreColor">
      {{ score() }}
    </span>
  </div>

  <div class="flex flex-col gap-3">
    @for (item of items(); track item.name) {
      <div class="bg-slate-900/40 border border-slate-800/40 rounded-xl px-4 py-3 flex justify-between items-center transition-colors hover:bg-slate-900/60">
        <span class="text-sm font-medium text-slate-300">{{ item.name }}</span>
        
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold"
                [ngClass]="{
                  'text-emerald-400': item.status === 'success',
                  'text-amber-400/90': item.status === 'warning',
                  'text-rose-400/90': item.status === 'error'
                }">
            {{ item.value }}
          </span>

          <img [src]="'/icons/' + item.status + '.svg'" alt="status icon" class="w-4 h-4 shrink-0">
        </div>
      </div>
    }
  </div>
</div>
