<div class="h-full rounded-2xl border p-6 shadow-xl transition-all duration-300"
     [ngClass]="[theme().border, theme().bg]">
  <div class="flex justify-between items-center mb-6">
    <div class="flex items-center gap-2.5">
      <img [src]="'icons/' + theme().type + '.svg'" alt="status icon" class="w-6 h-6">
      <h3 class="text-lg font-bold text-white leading-none">{{ title() }}</h3>
    </div>
     <span class="text-2xl font-extrabold" [ngClass]="theme().scoreColor">
      {{ score() }}
    </span>
  </div>

  <div class="flex flex-col gap-3">
    @for (item of items(); track item.name) {
      <div class="group relative bg-slate-900/40 border border-slate-800/40 rounded-xl px-4 py-3 flex justify-between items-start gap-3 transition-colors hover:bg-slate-900/60 cursor-help">
        <div class="flex items-center gap-1.5">
          <span class="text-sm font-medium text-slate-300 shrink-0">{{ item.name }}</span>
          @if (getTooltip(item.key)) {
            <svg class="w-3.5 h-3.5 text-slate-500 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          }
        </div>

        <div class="flex items-start gap-2 min-w-0">
          <span class="text-xs font-semibold text-right break-words"
                [ngClass]="{
                  'text-emerald-400': item.status === 'success',
                  'text-amber-400/90': item.status === 'warning',
                  'text-rose-400/90': item.status === 'error'
                }">
            {{ item.value }}
          </span>

          <img [src]="'icons/' + item.status + '.svg'" alt="status icon" class="w-4 h-4 shrink-0 mt-0.5">
        </div>

        @if (getTooltip(item.key)) {
          <div class="absolute left-0 right-0 bottom-full mb-2 p-3 bg-slate-800 border border-slate-600 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-10">
            <div class="text-xs">
              <p class="font-semibold text-cyan-400 mb-1">{{ getTooltip(item.key)?.title }}</p>
              <p class="text-slate-300 mb-2">{{ getTooltip(item.key)?.description }}</p>
              <p class="text-emerald-400">💡 {{ getTooltip(item.key)?.fix }}</p>
            </div>
            <div class="absolute bottom-0 left-1/2 transform -translate-x-1/2 translate-y-1/2 rotate-45 w-2 h-2 bg-slate-800 border-r border-b border-slate-600"></div>
          </div>
        }
      </div>
    }
  </div>
</div>
